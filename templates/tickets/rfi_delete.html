{% extends 'base.html' %}

{% block title %}Eliminar RFI{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 600px;">
    <div class="card shadow-sm border-danger">
        <div class="card-header bg-danger text-white">
            <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirmar eliminación</h5>
        </div>
        <div class="card-body">
            <p>¿Estás seguro de que deseas eliminar la RFI <strong>«{{ rfi.title }}»</strong>?</p>
            <p class="text-muted small">Esta acción no se puede deshacer.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'rfi_detail' rfi.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Eliminar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
