{% extends 'base.html' %}

{% block content %}
<div class="container py-4" style="max-width: 600px;">
    <div class="d-flex align-items-center mb-4 gap-3">
        <a href="{% url 'product_category_list' %}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="fw-bold mb-0">{{ page_title }}</h2>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form method="post" novalidate>
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold">{{ form.name.label }}</label>
                    {{ form.name }}
                    {% if form.name.errors %}<div class="text-danger small mt-1">{{ form.name.errors }}</div>{% endif %}
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">{{ form.description.label }}</label>
                    {{ form.description }}
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">{{ form.color.label }}</label>
                    <div class="d-flex align-items-center gap-3">
                        {{ form.color }}
                        <span class="text-muted small">Elige un color para identificar la categoría</span>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Guardar
                    </button>
                    <a href="{% url 'product_category_list' %}" class="btn btn-outline-secondary">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
