<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso protegido – {{ project.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background:#f8fafc; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .pin-card {
      max-width:400px; width:100%;
      border-radius:18px; overflow:hidden;
      box-shadow: 0 8px 40px rgba(113,75,103,.2);
    }
    .pin-header {
      background: linear-gradient(135deg,#714B67,#9b6b8f);
      color:#fff; padding:2rem 2rem 1.5rem; text-align:center;
    }
    .pin-body { background:#fff; padding:2rem; }
    .pin-input {
      letter-spacing:.3em; font-size:1.5rem; font-weight:700;
      text-align:center; border-radius:10px;
    }
    .btn-unlock {
      background:#714B67; color:#fff; border:none;
      border-radius:10px; font-weight:600; width:100%; padding:.75rem;
    }
    .btn-unlock:hover { background:#5a3a53; color:#fff; }
  </style>
</head>
<body>
<div class="pin-card">
  <div class="pin-header">
    <i class="bi bi-lock-fill mb-2" style="font-size:2.5rem;"></i>
    <h1 class="h5 mb-1">{{ project.name }}</h1>
    <div class="opacity-75 small">{{ project.folio }}</div>
    <div class="opacity-75 small mt-1">Este documento requiere un PIN de acceso.</div>
  </div>
  <div class="pin-body">
    {% if pin_error %}
    <div class="alert alert-danger py-2 text-center small mb-3">
      <i class="bi bi-exclamation-circle me-1"></i>{{ pin_error }}
    </div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label class="form-label small text-muted fw-semibold">PIN de acceso</label>
      <input type="password" name="pin" class="form-control pin-input mb-3"
             placeholder="••••" autofocus autocomplete="off">
      <button type="submit" class="btn btn-unlock">
        <i class="bi bi-unlock me-2"></i>Acceder
      </button>
    </form>
  </div>
</div>
</body>
</html>
